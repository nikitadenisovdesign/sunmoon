<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Sunmoon — Eye-driven particle field. Move your eyes; particles scatter.">
  <title>Sunmoon — Eye Particles</title>
  <link rel="icon" type="image/svg+xml" href="logo/icon.svg">

  <link rel="preload" href="fonts/At%20Aero%20TRIAL/AtAeroTRIAL-Medium.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="fonts/tt_octosquares/TT%20Octosquares%20Trial%20Condensed%20Medium.ttf" as="font" type="font/ttf" crossorigin>

  <style>
    @font-face {
      font-family: 'Aero';
      src: url('fonts/At%20Aero%20TRIAL/AtAeroTRIAL-Medium.otf') format('opentype');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'OctoCnd';
      src: url('fonts/tt_octosquares/TT%20Octosquares%20Trial%20Condensed%20Medium.ttf') format('truetype');
      font-weight: 500; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0a0a0b;
      color: #fff;
      font-family: 'Aero', system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #stage {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      cursor: crosshair;
    }

    #cam {
      position: fixed;
      right: 22px; bottom: 22px;
      width: 180px; height: 135px;
      border-radius: 12px;
      object-fit: cover;
      transform: scaleX(-1);
      border: 1px solid rgba(255,255,255,.12);
      background: #000;
      opacity: 0;
      transition: opacity .4s ease;
      pointer-events: none;
      z-index: 5;
    }
    #cam.show { opacity: .85; }

    .ui {
      position: fixed;
      left: 22px; top: 22px;
      z-index: 10;
      display: flex; flex-direction: column; gap: 14px;
      max-width: 360px;
      pointer-events: none;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 10px;
      height: 60px; padding: 0 22px;
      border-radius: 999px;
      background: rgba(20,20,20,.55);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,.06);
      font-family: 'OctoCnd', system-ui, sans-serif;
      font-size: 13px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: #fff;
      pointer-events: auto;
    }
    .pill img { width: 26px; height: 26px; }

    button.pill {
      cursor: pointer;
      transition: background .2s ease, transform .2s ease, color .2s ease;
    }
    button.pill:hover { background: #ff5b1f; transform: translateY(-1px); }
    button.pill:disabled { opacity: .55; cursor: default; transform: none; background: rgba(20,20,20,.55); }

    .status {
      pointer-events: none;
      font-family: 'Aero', system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: .01em;
      color: #8c8c8c;
      padding: 0 6px;
      max-width: 320px;
      line-height: 1.5;
    }
    .status b { color: #ffb04a; font-weight: 500; }

    .hint {
      position: fixed;
      left: 50%; bottom: 26px;
      transform: translateX(-50%);
      font-family: 'OctoCnd', system-ui, sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: rgba(255,255,255,.45);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
    }

    .vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.45) 78%, rgba(0,0,0,.85) 100%);
    }

    @media (max-width: 600px) {
      #cam { width: 120px; height: 90px; right: 14px; bottom: 14px; }
      .ui { left: 14px; top: 14px; max-width: calc(100% - 28px); }
      .pill { height: 52px; padding: 0 18px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="stage" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <video id="cam" autoplay playsinline muted aria-hidden="true"></video>

  <div class="ui">
    <a href="index.html" class="pill" aria-label="Sunmoon home">
      <img src="logo/icon.svg" alt="">
      <span>SUNMOON / EYES</span>
    </a>
    <button id="start" class="pill" type="button">Allow camera</button>
    <p id="status" class="status">Move your eyes — particles will scatter from your gaze.</p>
  </div>

  <p class="hint">Move your eyes · Camera stays in your browser</p>

  <script type="module" src="js/eye-particles.js"></script>
</body>
</html>
